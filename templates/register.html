<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — TaskFlow AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-body">

<div class="auth-bg">
  <div class="auth-orb orb1"></div>
  <div class="auth-orb orb2"></div>
  <div class="auth-orb orb3"></div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-icon"><i class="bi bi-lightning-charge-fill"></i></span>
      <span class="brand-text">TaskFlow<em>AI</em></span>
    </div>

    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Join TaskFlow AI today</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}" novalidate>
      <div class="form-group-float">
        <i class="bi bi-person-fill input-icon"></i>
        <input type="text" name="username" id="username" class="form-input" placeholder=" " required minlength="3" />
        <label for="username">Username</label>
      </div>

      <div class="form-group-float">
        <i class="bi bi-envelope-fill input-icon"></i>
        <input type="email" name="email" id="email" class="form-input" placeholder=" " required />
        <label for="email">Email address</label>
      </div>

      <div class="form-group-float">
        <i class="bi bi-lock-fill input-icon"></i>
        <input type="password" name="password" id="password" class="form-input" placeholder=" " required minlength="6" />
        <label for="password">Password</label>
        <button type="button" class="password-toggle" onclick="togglePassword('password')">
          <i class="bi bi-eye" id="toggleIcon-password"></i>
        </button>
      </div>

      <div class="form-group-float">
        <i class="bi bi-shield-lock-fill input-icon"></i>
        <input type="password" name="confirm_password" id="confirm_password" class="form-input" placeholder=" " required />
        <label for="confirm_password">Confirm password</label>
      </div>

      <button type="submit" class="btn-auth">
        Create Account <i class="bi bi-arrow-right ms-2"></i>
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>

<script>
  function togglePassword(id) {
    const inp = document.getElementById(id);
    const icon = document.getElementById('toggleIcon-' + id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    icon.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  }
</script>
</body>
</html>
