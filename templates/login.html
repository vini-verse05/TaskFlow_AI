<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TaskFlow AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-body">

<div class="auth-bg">
  <div class="auth-orb orb1"></div>
  <div class="auth-orb orb2"></div>
  <div class="auth-orb orb3"></div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-icon"><i class="bi bi-lightning-charge-fill"></i></span>
      <span class="brand-text">TaskFlow<em>AI</em></span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to manage your tasks</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="form-group-float">
        <i class="bi bi-person-fill input-icon"></i>
        <input type="text" name="username" id="username" class="form-input" placeholder=" " required autocomplete="username" />
        <label for="username">Username</label>
      </div>

      <div class="form-group-float">
        <i class="bi bi-lock-fill input-icon"></i>
        <input type="password" name="password" id="password" class="form-input" placeholder=" " required autocomplete="current-password" />
        <label for="password">Password</label>
        <button type="button" class="password-toggle" onclick="togglePassword('password')">
          <i class="bi bi-eye" id="toggleIcon-password"></i>
        </button>
      </div>

      <button type="submit" class="btn-auth">
        Sign In <i class="bi bi-arrow-right ms-2"></i>
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </p>

    <div class="auth-demo">
      <span>Demo:</span> <code>admin</code> / <code>admin123</code>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePassword(id) {
    const inp = document.getElementById(id);
    const icon = document.getElementById('toggleIcon-' + id);
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>
</body>
</html>
